spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**
          filters:
            - StripPrefix=1
        - id: product-service
          uri: lb://product-service
          predicates:
              - Path=/product-service/**
          filters:
                - StripPrefix=1
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
              - Path=/inventory-service/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://order-service
          predicates:
              - Path=/order-service/**
          filters:
            - StripPrefix=1
server:
  port: ${GATEWAY_SERVER_PORT}

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
  instance:
    prefer-ip-address: true